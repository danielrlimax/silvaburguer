<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital - Silva Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="shortcut icon" href="assets/img/logo.png" type="image/x-icon">

    <script data-goatcounter="https://danieldelima.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <style>
        .item-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header class="menu-header">
        <div class="logo">
            SILVA <span class="yellow">BURGUER</span>
        </div>
        <p class="tagline">Hamburgueria • Desde 2024</p>
    </header>

    <nav class="categories">
        <button class="cat-btn active" onclick="filterMenu('todos')">Todos</button>
        <button class="cat-btn" onclick="filterMenu('burgers')">Lanches</button>
        <button class="cat-btn" onclick="filterMenu('porcoes')">Porções</button>
        <button class="cat-btn" onclick="filterMenu('bebidas')">Bebidas</button>
    </nav>

    <main class="menu-container" id="menu-container">
        <p style="color:var(--primary-color); text-align: center; width: 100%; grid-column: 1 / -1; margin-top: 50px;">Carregando cardápio atualizado...</p>
    </main>

    <footer class="cart-footer">
        <div class="cart-info">
            <p>Total: <span id="cart-total">R$ 0,00</span></p>
            <small id="cart-count">Nenhum item</small>
        </div>
        <button class="btn-order" onclick="openModal()">
            Pedir no WhatsApp
        </button>
    </footer>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Seu Pedido</h2>

            <div id="cart-items-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; border-bottom: 1px solid #333;">
                </div>

            <label for="user-address">Endereço de Entrega:</label>
            <textarea id="user-address" placeholder="Rua, Número, Bairro, Complemento" rows="3"></textarea>

            <label for="payment-method">Forma de Pagamento:</label>
            <select id="payment-method" onchange="toggleTroco()">
                <option value="Pix">Pix</option>
                <option value="Cartão de Crédito">Cartão de Crédito (Levar Maquininha)</option>
                <option value="Cartão de Débito">Cartão de Débito (Levar Maquininha)</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>

            <div id="troco-container" style="display: none;">
                <label for="troco">Troco para quanto?</label>
                <input type="text" id="troco" placeholder="Ex: 50,00 (Deixe em branco se não precisar)">
            </div>

            <button class="btn-confirm" onclick="sendWhatsApp()">Confirmar e Enviar</button>
        </div>
    </div>

    <div id="addon-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAddonModal()">&times;</span>
            <h2>Turbine seu lanche!</h2>
            <h3 id="modal-burger-name" style="color: var(--primary-color); margin-bottom: 15px;">Nome do Lanche</h3>
            
            <p style="margin-bottom: 12px; font-weight: 600; color: var(--text-muted); font-size: 0.95rem;">Escolha seus adicionais:</p>
            
            <div class="addons-list" id="modal-addons-list"></div>

            <div style="margin-bottom: 15px;">
                <label for="burger-notes">Observações do Lanche:</label>
                <textarea id="burger-notes" placeholder="Ex: Sem cebola, carne ao ponto... (opcional)" rows="2"></textarea>
            </div>

            <button class="btn-confirm" onclick="confirmBurgerWithAddons()" style="margin-top: 5px;">
                Adicionar ao Carrinho - R$ <span id="modal-total-price">0,00</span>
            </button>
        </div>
    </div>

    <div id="drink-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeDrinkModal()">&times;</span>
            <h2>Escolha a Opção</h2>
            <h3 id="modal-drink-name" style="color: var(--primary-color); margin-bottom: 15px;">Nome da Bebida</h3>

            <div class="addons-list" id="drink-options-list">
                </div>

            <button class="btn-confirm" onclick="confirmDrink()" style="margin-top: 15px;">
                Adicionar ao Carrinho - R$ <span id="modal-drink-price">0,00</span>
            </button>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
